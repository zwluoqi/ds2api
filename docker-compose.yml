services:
  ds2api:
    image: ghcr.io/cjackhwang/ds2api:latest
    container_name: ds2api
    restart: always
    env_file:
      - .env
    ports:
      # Host port is configurable via DS2API_HOST_PORT; container port stays fixed at 5001.
      - "${DS2API_HOST_PORT:-6011}:5001"
    volumes:
      - ./config.json:/app/config.json    # 配置文件
      - ./data:/app/data                  # 运行时数据：对话历史、账号统计等
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - DS2API_ADMIN_KEY=${DS2API_ADMIN_KEY:-ds2api}
      - DS2API_CHAT_HISTORY_PATH=/app/data/chat_history.json
      - DS2API_ACCOUNT_STATS_DIR=/app/data/account_stats
      - DS2API_ACCOUNT_TOKENS_DIR=/app/data/account_tokens
